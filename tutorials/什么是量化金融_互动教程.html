    // Cumulative review on last lesson
    if (index === total - 1) {
      html += "<div class=\"cumulative-review\">";
      html += "<h3>课程总复习</h3>";
      html += "<ul class=\"review-list\">";
      course.lessons.forEach(function(ls, i) {
        html += "<li><a onclick=\"App.goTo(" + i + ")\">第 " + ls.id + " 课：" + ls.title + "</a></li>";
      });
      html += "</ul>";
      html += "<p style=\"margin-top:16px;color:var(--muted);font-size:0.85rem;\">恭喜完成《什么是量化金融？》全部课程！下一章将系统学习股票数据结构和收益率分析。</p>";
      html += "</div>";
    }

    document.getElementById("lesson-content").innerHTML = html;

    // Mark as completed
    if (completedLessons.indexOf(index) < 0) {
      completedLessons.push(index);
    }

    renderSidebar();

    // Scroll to top
    document.getElementById("reader").scrollTop = 0;
    window.scrollTo(0, 0);
  }

  function flipCard(el) {
    el.classList.toggle("flipped");
  }

  function checkAnswer(el, quizIndex, optionIndex, correctIndex) {
    var parent = el.parentElement.parentElement;
    var options = parent.querySelectorAll(".quiz-option");
    var feedback = document.getElementById("feedback-" + quizIndex);

    // Disable all options
    options.forEach(function(o) { o.classList.add("disabled"); });

    if (optionIndex === correctIndex) {
      el.classList.add("correct");
      feedback.classList.add("show", "correct");
    } else {
      el.classList.add("wrong");
      options[correctIndex].classList.add("correct");
      feedback.classList.add("show", "wrong");
    }
  }

  window.App = {
    goTo: renderLesson,
    flipCard: flipCard,
    checkAnswer: checkAnswer
  };

  // Init on load
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

  </script>
</body>
</html>
