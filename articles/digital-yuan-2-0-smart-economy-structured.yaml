## Three_Core_Changes
- change_1:
  - title: 从现金型向存款货币型转变
  - before: "M0替代，不计付利息，游离于银行信贷体系之外"
  - after: "商业银行负债，计付利息，纳入存款准备金制度和存款保险保障范畴"
  - impacts:
    - 解决商业银行运营动力问题
    - 增强用户持有意愿
    - 实现与现代银行体系全面融合
- change_2:
  - title: 账户体系+币串+智能合约三位一体
  - account_system: "以账户为基础，松耦合，可穿透式监管"
  - coin_string: "加密数字串，携带可编程元数据（支付条件、用途限制、时间戳、交易轨迹）"
  - smart_contract: "预先编写的代码，满足条件时自动执行，2026年春节红包精准直达案例"
- change_3:
  - title: 兼容分布式账本技术
  - architecture: "中央银行技术支持+商业银行运营+兼容分布式账本技术"
  - centralization_benefit: "央行掌握统一发行和登记总账，确保货币主权安全"
  - distributed_benefit: "特定场景下兼容应用分布式账本技术"
  - rwa_policy: "2026年2月6日八部委通知，为RWA留出合规发展空间"

## Four_Practice_Paths
- path_1:
  - title: 推动产业升级，实现精准滴灌
  - scenarios: [智能制造, 智慧农业, 现代物流]
  - case: "2026年2月成都全国首单数字人民币智能合约农民工工资发放"
  - bank: 交通银行四川省分行
  - mechanism: "智能代发合约，专款专用，精准直达"
- path_2:
  - title: 重塑消费范式，促进普惠金融
  - soft_wallet: "手机APP"
  - hard_wallet: "智能卡、可穿戴设备，支持双离线支付"
  - offline_mechanism: "近场通信碰一碰"
  - county_coverage: "江苏宝应、兴化等地打造数币特色村镇"
- path_3:
  - title: 优化社会治理，提升监管效能
  - principle: "可控匿名——小额匿名、大额可追溯"
  - ai_big_data: "央行利用AI和大数据进行宏观模式识别与趋势分析"
  - benefits:
    - 提前预警产业过热或衰退风险
    - 识别防范系统性金融风险跨市场传染
- path_4:
  - title: 助力全球合作，打造跨境支付新通道
  - mBridge_case: "2025年8月深圳6800万元跨境结算，数秒到账"
