## Core_Thesis
- main_argument: "银行的高质量发展，关键在于构建并发挥以人工智能大模型为核心的强大科技引擎。"
- framework: 认知-决策-执行全链条框架
- three_layers:
  - layer: AI大模型是引擎而非工具
    detail: 引擎是主动驱动的，工具是被动使用的。只有当AI大模型成为驱动银行核心业务流程的引擎，才能真正实现高质量发展。
  - layer: 重点是构建而非采购
    detail: 构建意味着建立自己的AI能力体系（数据治理、算力基础设施、人才团队、LLMOps平台），采购只是买别人的产品。
  - layer: 目标是高质量发展而非降本增效
    detail: 降本增效是AI的短期价值，高质量发展是长期战略——更好的客户服务、更准的风险定价、更强的创新能力、更优的资本配置。

## Key_Value_Propositions
- value_1:
  - title: 在国家战略框架下回答银行为何必须以AI为核心引擎
  - detail: 从银行业深层结构性挑战（息差收窄、风险积聚、效率瓶颈）出发，论证大模型智能涌现是银行生存发展的必要条件。将银行AI战略置于人工智能+国家战略和十五五规划中审视。
- value_2:
  - title: 首次系统构建认知-决策-执行全链条框架
  - detail: "认知层：AI提升对客户画像、市场趋势、风险信号的感知深度。决策层：AI辅助信用审批、风险定价、投资组合配置。执行层：AI实现客服交互、营销投放、运营合规的自动化与智能化。杨再平评价为范式转移级别的理论贡献。"
- value_3:
  - title: 大模型与小模型的协同策略
  - detail: 大模型用于泛化推理、复杂决策；小模型用于高频低延迟交易、简单分类、合规检查。直接解答银行IT核心焦虑——引入大模型后，几百个存量小模型怎么办？
- value_4:
  - title: IT架构协同演进的系统方法论
  - detail: 提出数据层、模型层、服务层、应用层的分层架构，以及MaaS（模型即服务）平台作为AI能力中心的建设路径。为CTO和架构师提供可参照蓝图。
- value_5:
  - title: 紧贴最新监管的风险治理框架
  - detail: 构建覆盖技术风险、网络安全和合规伦理的三维风险治理框架，逐一呼应央行树牢底线思维、智能体安全新规安全可靠可控底线以及金融监管总局对有效管理算法模型风险的要求。
- value_6:
  - title: 前瞻智能体时代的金融应用课题
  - detail: 2026年5月智能体新规发布后，AI智能体将进入金融决策核心环节。本书的认知-决策-执行框架与风险治理体系，恰好为银行探索智能体决策权限、能力边界与安全底线提供了前瞻性思维工具。

