name: Generate articles index

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate articles/index.json
        run: |
          python3 << 'EOF'
          import os
          import json
          import re
          from pathlib import Path
          from datetime import datetime

          articles_dir = Path('articles')
          output = []

          for md_file in sorted(articles_dir.glob('*.md')):
              content = md_file.read_text(encoding='utf-8')
              
              # Extract YAML frontmatter
              frontmatter = {}
              if content.startswith('---'):
                  end = content.find('---', 3)
                  if end != -1:
                      yaml_block = content[3:end]
                      for line in yaml_block.strip().split('\n'):
                          if ':' in line and not line.strip().startswith('#'):
                              key, _, value = line.partition(':')
                              key = key.strip()
                              value = value.strip().strip('"').strip("'")
                              if value:
                                  frontmatter[key] = value

              # Build entry
              slug = md_file.stem
              entry = {
                  'title': frontmatter.get('title', slug),
                  'slug': slug,
                  'url': f'/articles/{md_file.name}',
                  'description': frontmatter.get('description', ''),
                  'date': frontmatter.get('date', ''),
                  'tags': json.loads(frontmatter.get('tags', '[]')) if 'tags' in frontmatter else [],
                  'schema_type': frontmatter.get('schema_type', 'Article')
              }

              # Only add if it has a title (valid article)
              if entry['title'] and entry['title'] != slug:
                  output.append(entry)

          # Write index
          index_path = articles_dir / 'index.json'
          index_path.write_text(
              json.dumps(output, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print(f'Generated index with {len(output)} articles')
          for a in output:
              print(f'  - {a["title"]}')
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate articles/index.json"
            git push
          fi
