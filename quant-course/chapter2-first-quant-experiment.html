<script>
// ===== Generate random stock data for demos =====
function generatePrices(n=250, startPrice=180, volatility=0.018) {
  const closes = [startPrice];
  for (let i=1; i<n; i++) {
    const r = (Math.random()-0.48) * volatility;
    closes.push(closes[i-1] * (1+r));
  }
  const rets = [];
  for (let i=1; i<closes.length; i++) {
    rets.push((closes[i]-closes[i-1])/closes[i-1]);
  }
  return {closes, rets, dates: Array.from({length:n},(_,i)=> {
    const d = new Date(2025,8,1);
    d.setDate(d.getDate()+i);
    return d.toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
  })};
}

const aaplData = generatePrices(250, 180, 0.017);
const tslaData = generatePrices(250, 230, 0.035);
const nvdaData = generatePrices(250, 120, 0.031);

// ===== Chart drawing =====
function drawLineChart(canvasId, data, label, color) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height, pad={t:20,r:20,b:40,l:50};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const vals = data.closes, n=vals.length;
  const min=Math.min(...vals)*0.95, max=Math.max(...vals)*1.05;
  const xsc = (i) => pad.l + (i/(n-1))*pw;
  const ysc = (v) => pad.t + (1-(v-min)/(max-min))*ph;
  
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='#e8e0d0'; ctx.lineWidth=0.5;
  for (let gy=0; gy<=4; gy++) {
    const y=pad.t+gy*ph/4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
  }
  // line
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5;
  for (let i=0;i<n;i++) { const x=xsc(i),y=ysc(vals[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
  ctx.stroke();
  // axes
  ctx.fillStyle='#766f66'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  for (let gy=0; gy<=4; gy++) {
    const val = min+(max-min)*gy/4;
    ctx.fillText('$'+val.toFixed(0), pad.l-5, pad.t+gy*ph/4+4);
  }
  // x labels
  const skip=Math.floor(n/6);
  for (let i=0;i<n;i+=skip) {
    ctx.fillText(data.dates[i], xsc(i), H-pad.b+15);
  }
  // title
  ctx.fillStyle='#231f1a'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label, W/2, pad.t-4);
}

function drawHistogram(canvasId, rets, label, color) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height, pad={t:20,r:20,b:40,l:45};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  
  // bins
  const min=-0.08, max=0.08, nbins=30, bw=(max-min)/nbins;
  const bins=new Array(nbins).fill(0);
  rets.forEach(r => { const i=Math.floor((r-min)/bw); if(i>=0&&i<nbins) bins[i]++; });
  const maxCount=Math.max(...bins,1);
  
  ctx.clearRect(0,0,W,H);
  bins.forEach((cnt,i)=>{
    const x=pad.l+i*pw/nbins, y=pad.t+(1-cnt/maxCount)*ph;
    const w=pw/nbins-1;
    ctx.fillStyle=color; ctx.globalAlpha=0.75;
    ctx.fillRect(x,y,w,pad.t+ph-y);
  });
  ctx.globalAlpha=1;
  
  // mean line
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const mx = pad.l + ((mean-min)/(max-min))*pw;
  ctx.strokeStyle='#c2410c'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(mx, pad.t); ctx.lineTo(mx, H-pad.b); ctx.stroke();
  ctx.setLineDash([]);
  
  // axes
  ctx.fillStyle='#766f66'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  for (let gx=0; gx<=4; gx++) {
    const val=min+(max-min)*gx/4;
    const x=pad.l+gx*pw/4;
    ctx.fillText((val*100).toFixed(1)+'%', x, H-pad.b+14);
  }
  for (let gy=0; gy<=3; gy++) {
    ctx.fillText(Math.round(maxCount*gy/3), pad.l-6, pad.t+gy*ph/3+4);
  }
  ctx.fillStyle='#231f1a'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label+' (均值: '+(mean*100).toFixed(2)+'%)', W/2, pad.t-4);
}

function drawBarChart(canvasId, labels, values, title) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height, pad={t:20,r:30,b:50,l:60};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const colors=['#4f9ed6','#e07b39','#5da35d'];
  
  ctx.clearRect(0,0,W,H);
  const barW=Math.min(50, pw/labels.length*0.6);
  const gap=(pw-barW*labels.length)/(labels.length+1);
  
  values.forEach((v,i)=>{
    const x=pad.l+gap+(barW+gap)*i;
    const h=(v/Math.max(...values))*ph*0.85;
    ctx.fillStyle=colors[i%colors.length];
    ctx.fillRect(x, H-pad.b-h, barW, h);
    // label
    ctx.fillStyle='#231f1a'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(labels[i], x+barW/2, H-pad.b+18);
    // value
    ctx.fillText((v*100).toFixed(2)+'%', x+barW/2, H-pad.b-h-8);
  });
  ctx.fillText(title, W/2, pad.t-4);
}

  const r=(p2-p1)/p1;
  document.getElementById('sim-result').innerHTML = `收益率 = (${p2} - ${p1}) / ${p1} = <strong>${(r*100).toFixed(2)}%</strong>${r>=0?' 📈':' 📉'}`;
}

// ===== Init charts =====
function initCharts() {
  drawLineChart('chart-aapl-price', aaplData, 'AAPL 收盘价', '#4f9ed6');
  drawLineChart('chart-tsla-price', tslaData, 'TSLA 收盘价', '#e07b39');
  drawLineChart('chart-nvda-price', nvdaData, 'NVDA 收盘价', '#5da35d');
  drawHistogram('hist-aapl', aaplData.rets, 'AAPL 日收益率分布', '#4f9ed6');
  drawHistogram('hist-tsla', tslaData.rets, 'TSLA 日收益率分布', '#e07b39');
  drawHistogram('hist-nvda', nvdaData.rets, 'NVDA 日收益率分布', '#5da35d');
  drawBarChart('chart-vol', ['AAPL','TSLA','NVDA'], [
    aaplData.rets.reduce((a,b)=>a+b*b,0)/(aaplData.rets.length-1),
    tslaData.rets.reduce((a,b)=>a+b*b,0)/(tslaData.rets.length-1),
    nvdaData.rets.reduce((a,b)=>a+b*b,0)/(nvdaData.rets.length-1)
  ].map(Math.sqrt), '日收益率波动对比');
  
  // cumulative return
  drawCumulative();
}

function drawCumulative() {
  const all=[aaplData,tslaData,nvdaData];
  const names=['AAPL','TSLA','NVDA'];
  const colors=['#4f9ed6','#e07b39','#5da35d'];
  const c=document.getElementById('chart-cum');
  if(!c)return;
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height,pad={t:20,r:20,b:40,l:55};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  
  ctx.clearRect(0,0,W,H);
  let globalMin=Infinity,globalMax=-Infinity;
  const cumData=[];
  
  all.forEach(data=>{
    const cum=[];
    let prod=1;
    data.rets.forEach(r=>{prod*=(1+r);cum.push(prod-1);});
    cumData.push(cum);
    const mn=Math.min(...cum),mx=Math.max(...cum);
    if(mn<globalMin)globalMin=mn;
    if(mx>globalMax)globalMax=mx;
  });
  
  const ysc=v=>pad.t+(1-(v-globalMin)/(globalMax-globalMin))*ph;
  
  cumData.forEach((cum,i)=>{
    ctx.beginPath();ctx.strokeStyle=colors[i];ctx.lineWidth=1.5;
    cum.forEach((v,j)=>{
      const x=pad.l+j*pw/(cum.length-1),y=ysc(v);
      j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
  
  // legend
  ctx.font='11px sans-serif';
  cumData.forEach((cum,i)=>{
    const x=W-pad.r-120+i*50,y=pad.t+4;
    ctx.fillStyle=colors[i];ctx.fillRect(x,y,10,10);
    ctx.fillStyle='#231f1a';ctx.fillText(names[i],x+13,y+9);
  });
  ctx.fillStyle='#231f1a';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText('三股累计收益率对比',W/2,pad.t-4);
}

  // 1: 2.1 股票数据 OHLCV

let currentSection = 0;
const reader = document.getElementById('reader');
const navItems = document.querySelectorAll('.nav-item');

function showSection(idx) {
  currentSection = idx;
  reader.innerHTML = sections[idx];
  navItems.forEach((item,i)=>{ item.classList.toggle('active', i===idx); });
  window.scrollTo(0,0);
  
  // re-init charts for sections that need them
  setTimeout(initCharts, 100);
}

navItems.forEach(item => {
  item.addEventListener('click', ()=>{
    showSection(parseInt(item.dataset.section));
  });
});

// Initial render
showSection(0);

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    if (currentSection < sections.length-1) showSection(currentSection+1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    if (currentSection > 0) showSection(currentSection-1);
  }
});
</script>
